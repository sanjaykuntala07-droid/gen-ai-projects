services:
  # ----------------------------------------------------------------------------
  # API Service (NestJS)
  # ----------------------------------------------------------------------------
  - type: web
    name: smartnotes-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    region: ohio # USA (us-east-2)
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: smartnotes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smartnotes-redis
          property: connectionString
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: smartnotes-web
          property: url
      # Auth0 credentials should be added manually in the Render Dashboard for security
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false

  # ----------------------------------------------------------------------------
  # Web Frontend (React + Nginx)
  # ----------------------------------------------------------------------------
  - type: web
    name: smartnotes-web
    env: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    region: ohio # USA (us-east-2)
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smartnotes-api
          property: url

  # ----------------------------------------------------------------------------
  # Redis (for Reminders/Queues)
  # ----------------------------------------------------------------------------
  - type: redis
    name: smartnotes-redis
    region: ohio
    plan: free
    ipAllowList: [] # Only allow internal connections

# ----------------------------------------------------------------------------
# PostgreSQL Database
# ----------------------------------------------------------------------------
databases:
  - name: smartnotes-db
    region: ohio
    plan: free
