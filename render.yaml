# Render Blueprint for SmartNotes
services:
  # ----------------------------------------------------------------------------
  # API Service (NestJS)
  # ----------------------------------------------------------------------------
  - type: web
    name: smartnotes-api
    env: docker
    dockerfilePath: smartnotes/apps/api/Dockerfile
    dockerContext: smartnotes
    region: ohio
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: smartnotes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smartnotes-redis
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false

  # ----------------------------------------------------------------------------
  # Web Frontend (React + Nginx)
  # ----------------------------------------------------------------------------
  - type: web
    name: smartnotes-web
    env: docker
    dockerfilePath: smartnotes/apps/web/Dockerfile
    dockerContext: smartnotes
    region: ohio
    plan: free
    dockerBuildArgs:
      VITE_API_URL: https://smartnotes-api.onrender.com/api # Direct URL
    envVars:
      - key: VITE_API_URL
        value: https://smartnotes-api.onrender.com/api

  # ----------------------------------------------------------------------------
  # Redis
  # ----------------------------------------------------------------------------
  - type: redis
    name: smartnotes-redis
    region: ohio
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow all for setup - change to internal only later"

# ----------------------------------------------------------------------------
# PostgreSQL Database
# ----------------------------------------------------------------------------
databases:
  - name: smartnotes-db
    region: ohio
    plan: free
